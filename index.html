<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision Tools Inc.</title>
 <link rel="stylesheet"href="style.css">

</head>

<body>

<header>
  <nav>
    <h2>Precision Tools</h2>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#team">Team</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>
<div class="hero">
  <div>
    <h1>Welcome to Precision Tools Inc.</h1>
    <p>High-quality manufacturing solutions for modern industries</p>
    <button onclick="alert('Welcome!')">Get Started</button>
  </div>
</div>


<section id="team">
  <h2>Meet the Team</h2>
  <div class="team">
    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTR77_Y0Na_t_INY7YJegDvc7WeaTOnIFkyVw&s">
      <h3>John Doe</h3>
      <p>CEO</p>
    </div>

    <div class="card">
      <img src="https://media.defense.gov/2019/Feb/13/2002089515/-1/-1/0/180709-A-SP580-001.JPG">
      <h3>Jane Smith</h3>
      <p>Engineer</p>
    </div>

    <div class="card">
      <img src="https://media.licdn.com/dms/image/v2/C4D03AQE9Fg2rJ3OIpQ/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1623489924746?e=2147483647&v=beta&t=s1oWcYId7-eG1q9XUMO9592VxvmCfJ2S2HQUgT_LqOU">
      <h3>Mike Johnson</h3>
      <p>Designer</p>
    </div>
  </div>
</section>


<section id="contact">
  <h2>Contact Us</h2>
  <form onsubmit="return validateForm()">
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button type="submit" class="submit-btn">Send</button>
  </form>
</section>


<footer>
  <p>© 2026 Precision Tools Inc.</p>
</footer>

<script>
function validateForm() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  if (name === "" || email === "" || message === "") {
    alert("All fields are required!");
    return false;
  }

  if (!email.includes("@")) {
    alert("Enter a valid email!");
    return false;
  }

  alert("Form submitted successfully!");
  return true;
}
</script>

</body>
</html>
